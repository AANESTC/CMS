<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <!-- CSS Link -->
    <link rel="stylesheet" href="style.css">
    <!-- Icon Link -->
</head>
<script>
    
</script>
<body>
    <div class="login">
        <div class="logo">
            <i class='bx bx-user-circle'></i>
            <h2>Login</h2>
        </div>

        <!-- Modify the form action to navigate to index.html -->
        <form action="index.html">
            <div class="input_box">
                <span>Username</span>
                <div class="icon">
                    <i class='bx bxs-user'></i>
                    <input type="text" placeholder="Enter Username" required>
                </div>
            </div>
            <div class="input_box">
                <span>Password</span>
                <div class="icon">
                    <i class='bx bxs-lock-alt'></i>
                    <input type="password" placeholder="Enter Password" required>
                </div>
            </div>

            <div class="forgot_password">
                <a href="#">Forgot Password?</a>
            </div>

            <!-- Modify the login button to submit the form -->
            <button type="submit">Login</button>

            <p class="signup">Or Sign Up Using</p>

            <div class="social_icon">
                <a href="#" id="google"><i class='bx bxl-google'></i></a>
                <a href="#" id="github"><i class='bx bxl-github'></i></a>
            </div>
        </form>
    </div>
</body>
</html>
